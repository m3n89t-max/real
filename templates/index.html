<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Bot Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --blue: #58a6ff;
    --yellow: #d29922;
    --accent: #238636;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }

  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 18px; font-weight: 600; color: var(--blue); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .main { padding: 20px 24px; max-width: 1600px; margin: 0 auto; }

  .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .status-badge.running { background: rgba(63,185,80,.15); color: var(--green); border: 1px solid rgba(63,185,80,.3); }
  .status-badge.stopped { background: rgba(248,81,73,.15); color: var(--red); border: 1px solid rgba(248,81,73,.3); }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .running .dot { background: var(--green); animation: pulse 2s infinite; }
  .stopped .dot { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .btn { padding: 6px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity .15s; }
  .btn:hover { opacity: .8; }
  .btn-green { background: var(--accent); color: #fff; }
  .btn-red { background: #da3633; color: #fff; }
  .btn-blue { background: #1f6feb; color: #fff; }
  .btn-gray { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .card-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
  .card-value { font-size: 24px; font-weight: 700; }
  .card-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .neu { color: var(--text); }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .grid2-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 20px; }
  @media (max-width: 900px) { .grid2, .grid2-3 { grid-template-columns: 1fr; } }

  .panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .panel-title { font-size: 13px; font-weight: 600; }
  .panel-body { padding: 16px; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { color: var(--text2); font-weight: 500; padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 8px 10px; border-bottom: 1px solid rgba(48,54,61,.6); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-long { background: rgba(63,185,80,.15); color: var(--green); }
  .badge-short { background: rgba(248,81,73,.15); color: var(--red); }

  .chart-wrap { position: relative; height: 220px; }

  #log-box { background: var(--bg); border-radius: 6px; padding: 10px; font-family: 'Consolas', monospace; font-size: 11px; height: 280px; overflow-y: auto; line-height: 1.6; }
  .log-err { color: var(--red); }
  .log-warn { color: var(--yellow); }
  .log-info { color: var(--text2); }

  .settings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: var(--text2); }
  .field input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 13px; outline: none; }
  .field input:focus { border-color: var(--blue); }
  .settings-actions { margin-top: 16px; display: flex; gap: 8px; align-items: center; }

  .tabs { display: flex; gap: 2px; border-bottom: none; }
  .tab { padding: 4px 12px; cursor: pointer; font-size: 12px; color: var(--text2); border-bottom: 2px solid transparent; }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 500; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .empty-msg { color: var(--text2); font-size: 13px; text-align: center; padding: 30px; }
  .scan-info { font-size: 11px; color: var(--text2); }
</style>
</head>
<body>

<div class="header">
  <h1>⚡ Trading Bot</h1>
  <div class="header-right">
    <span class="scan-info" id="scan-info">스캔: —</span>
    <span id="status-badge" class="status-badge stopped">
      <span class="dot"></span>
      <span id="status-text">중지됨</span>
    </span>
    <button class="btn btn-green" onclick="botAction('start')">▶ 시작</button>
    <button class="btn btn-red"   onclick="botAction('stop')">■ 중지</button>
  </div>
</div>

<div class="main">

  <div class="cards">
    <div class="card">
      <div class="card-label">잔고 (USDT)</div>
      <div class="card-value neu" id="c-balance">—</div>
    </div>
    <div class="card">
      <div class="card-label">총 PnL</div>
      <div class="card-value" id="c-pnl">—</div>
    </div>
    <div class="card">
      <div class="card-label">승률</div>
      <div class="card-value neu" id="c-wr">—</div>
    </div>
    <div class="card">
      <div class="card-label">총 거래</div>
      <div class="card-value neu" id="c-total">—</div>
      <div class="card-sub" id="c-wl">승/패: — / —</div>
    </div>
    <div class="card">
      <div class="card-label">Profit Factor</div>
      <div class="card-value neu" id="c-pf">—</div>
    </div>
    <div class="card">
      <div class="card-label">평균 손익비</div>
      <div class="card-value neu" id="c-rr">—</div>
    </div>
  </div>

  <div class="grid2-3">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">누적 PnL 차트</span>
        <span style="font-size:11px;color:var(--text2)">최근 50거래</span>
      </div>
      <div class="panel-body">
        <div class="chart-wrap"><canvas id="pnl-chart"></canvas></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">오픈 포지션</span>
        <span id="open-count" style="font-size:11px;color:var(--text2)">0개</span>
      </div>
      <div class="panel-body table-wrap" id="open-table-wrap">
        <div class="empty-msg">포지션 없음</div>
      </div>
    </div>
  </div>

  <div class="grid2">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">최근 거래</span>
        <div class="tabs">
          <div class="tab active" onclick="switchTab('all',this)">전체</div>
          <div class="tab" onclick="switchTab('win',this)">승</div>
          <div class="tab" onclick="switchTab('loss',this)">패</div>
        </div>
      </div>
      <div class="panel-body table-wrap">
        <table>
          <thead><tr>
            <th>심볼</th><th>방향</th><th>진입가</th><th>청산가</th><th>PnL</th><th>시간</th>
          </tr></thead>
          <tbody id="trades-tbody"></tbody>
        </table>
        <div id="trades-empty" class="empty-msg" style="display:none">거래 기록 없음</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">실시간 로그</span>
        <div style="display:flex;gap:8px;align-items:center">
          <label style="font-size:11px;color:var(--text2);display:flex;gap:4px;align-items:center;cursor:pointer">
            <input type="checkbox" id="log-follow" checked style="accent-color:var(--blue)"> 자동스크롤
          </label>
          <button class="btn btn-gray" style="padding:3px 8px;font-size:11px" onclick="clearLog()">지우기</button>
        </div>
      </div>
      <div class="panel-body" style="padding:8px">
        <div id="log-box"></div>
      </div>
    </div>
  </div>

  <div class="panel" style="margin-bottom:20px">
    <div class="panel-header">
      <span class="panel-title">⚙ 설정 (rules_config.json)</span>
      <button class="btn btn-gray" style="font-size:11px;padding:3px 10px" onclick="loadSettings()">↺ 새로고침</button>
    </div>
    <div class="panel-body">
      <div class="settings-grid" id="settings-grid"></div>
      <div class="settings-actions">
        <button class="btn btn-blue" onclick="saveSettings()">💾 저장 & 반영</button>
        <span id="save-msg" style="font-size:12px;color:var(--text2)"></span>
      </div>
    </div>
  </div>

</div>

<script>
let pnlChart = null;
let allTrades = [];
let tradeFilter = 'all';
let logOffset = 0;
let settingsData = {};

const LABELS = {
  stop_loss_pct:'SL %', atr_sl_multiplier:'ATR SL 배수',
  atr_sl_max_pct:'ATR SL 최대 %', atr_sl_min_pct:'ATR SL 최소 %',
  min_tp_pct:'TP 최소 %', max_tp_pct:'TP 최대 %',
  min_rr_ratio:'최소 손익비', tp1_ratio:'TP1 비율', tp1_rr:'TP1 RR',
  tp2_ratio:'TP2 비율', tp2_rr:'TP2 RR',
  pivot_left:'피벗 왼쪽', pivot_right:'피벗 오른쪽',
  scan_interval_sec:'스캔 간격(초)', entry_cooldown_sec:'진입 쿨다운(초)',
  loss_cooldown_sec:'손실 쿨다운(초)', max_total_exposure_pct:'최대 노출 %',
  max_open_positions:'최대 동시 포지션', max_consecutive_losses:'최대 연속 손실',
  account_risk_pct:'계좌 리스크 %',
};

document.addEventListener('DOMContentLoaded', () => {
  initChart();
  loadSettings();
  refresh();
  setInterval(refresh, 5000);
  setInterval(pollLogs, 2000);
});

async function refresh() {
  await Promise.all([fetchStatus(), fetchStats(), fetchTrades(), fetchOpen(), fetchChart()]);
}

async function fetchStatus() {
  try {
    const d = await api('/api/status');
    const badge = document.getElementById('status-badge');
    const txt   = document.getElementById('status-text');
    if (d.running) {
      badge.className = 'status-badge running';
      txt.textContent = '실행 중';
    } else {
      badge.className = 'status-badge stopped';
      txt.textContent = '중지됨';
    }
    if (d.balance) {
      document.getElementById('c-balance').textContent = '$' + d.balance.toLocaleString('en', {minimumFractionDigits:2, maximumFractionDigits:2});
    }
    if (d.scan_count) {
      document.getElementById('scan-info').textContent = '스캔 #' + d.scan_count + ' | ' + (d.last_scan||'');
    }
  } catch(e) {}
}

async function fetchStats() {
  try {
    const d = await api('/api/stats');
    const pnl = d.total_pnl || 0;
    const pnlEl = document.getElementById('c-pnl');
    pnlEl.textContent = (pnl >= 0 ? '+' : '') + '$' + pnl.toFixed(2);
    pnlEl.className = 'card-value ' + (pnl >= 0 ? 'pos' : 'neg');
    document.getElementById('c-wr').textContent = d.win_rate != null ? (d.win_rate*100).toFixed(1)+'%' : '—';
    document.getElementById('c-total').textContent = d.total_trades || 0;
    document.getElementById('c-wl').textContent = '승/패: '+(d.win||0)+' / '+(d.loss||0);
    document.getElementById('c-pf').textContent = d.profit_factor ? d.profit_factor.toFixed(2) : '—';
    document.getElementById('c-rr').textContent = d.avg_rr ? d.avg_rr.toFixed(2) : '—';
  } catch(e) {}
}

async function fetchTrades() {
  try {
    allTrades = await api('/api/trades');
    renderTrades();
  } catch(e) {}
}

function switchTab(filter, el) {
  tradeFilter = filter;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTrades();
}

function renderTrades() {
  const closed = allTrades.filter(t => t.status === 'closed');
  let rows = closed;
  if (tradeFilter === 'win')  rows = closed.filter(t => (parseFloat(t.pnl_usdt)||0) > 0);
  if (tradeFilter === 'loss') rows = closed.filter(t => (parseFloat(t.pnl_usdt)||0) <= 0);
  rows = rows.slice(0, 50);
  const tbody = document.getElementById('trades-tbody');
  const empty = document.getElementById('trades-empty');
  if (!rows.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  tbody.innerHTML = rows.map(r => {
    const pnl = r.pnl_usdt != null ? parseFloat(r.pnl_usdt) : null;
    const pnlStr = pnl != null
      ? '<span class="'+(pnl>=0?'pos':'neg')+'">'+(pnl>=0?'+':'')+'$'+pnl.toFixed(2)+'</span>'
      : '—';
    const time = (r.exit_time||r.entry_time||'').replace('T',' ').slice(0,16);
    return '<tr>'
      +'<td>'+escH(r.symbol||'—')+'</td>'
      +'<td><span class="badge badge-'+(r.side||'').toLowerCase()+'">'+escH(r.side||'—')+'</span></td>'
      +'<td>'+(r.entry_price!=null?parseFloat(r.entry_price).toFixed(4):'—')+'</td>'
      +'<td>'+(r.exit_price!=null?parseFloat(r.exit_price).toFixed(4):'—')+'</td>'
      +'<td>'+pnlStr+'</td>'
      +'<td style="color:var(--text2)">'+escH(time)+'</td>'
      +'</tr>';
  }).join('');
}

async function fetchOpen() {
  try {
    const data = await api('/api/open');
    document.getElementById('open-count').textContent = data.length+'개';
    const wrap = document.getElementById('open-table-wrap');
    if (!data.length) {
      wrap.innerHTML = '<div class="empty-msg">포지션 없음</div>';
      return;
    }
    wrap.innerHTML = '<table><thead><tr><th>심볼</th><th>방향</th><th>진입가</th><th>현재SL</th><th>수량</th></tr></thead><tbody>'
      + data.map(r => '<tr>'
        +'<td>'+escH(r.symbol||'—')+'</td>'
        +'<td><span class="badge badge-'+(r.side||'').toLowerCase()+'">'+escH(r.side||'—')+'</span></td>'
        +'<td>'+(r.entry_price!=null?parseFloat(r.entry_price).toFixed(4):'—')+'</td>'
        +'<td>'+(r.stop_loss!=null?parseFloat(r.stop_loss).toFixed(4):'—')+'</td>'
        +'<td>'+(r.quantity||'—')+'</td>'
        +'</tr>').join('')
      + '</tbody></table>';
  } catch(e) {}
}

function initChart() {
  const ctx = document.getElementById('pnl-chart').getContext('2d');
  pnlChart = new Chart(ctx, {
    data: {
      labels: [],
      datasets: [
        {
          type: 'line',
          label: '누적 PnL',
          data: [],
          borderColor: '#3fb950',
          backgroundColor: 'rgba(63,185,80,.08)',
          borderWidth: 2, fill: true, tension: 0.3,
          pointRadius: 3, pointHoverRadius: 5, yAxisID: 'y',
        },
        {
          type: 'bar',
          label: '개별 PnL',
          data: [],
          backgroundColor: [],
          borderWidth: 0, yAxisID: 'y',
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#8b949e', boxWidth: 12, font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: '#8b949e', font: { size: 10 }, maxTicksLimit: 8 }, grid: { color: '#21262d' } },
        y: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: '#21262d' } }
      }
    }
  });
}

async function fetchChart() {
  try {
    const d = await api('/api/pnl_chart');
    pnlChart.data.labels = d.labels;
    pnlChart.data.datasets[0].data = d.cumulative;
    pnlChart.data.datasets[1].data = d.pnls;
    pnlChart.data.datasets[1].backgroundColor = d.pnls.map(v => v >= 0 ? 'rgba(63,185,80,.5)' : 'rgba(248,81,73,.5)');
    pnlChart.update('none');
  } catch(e) {}
}

async function pollLogs() {
  try {
    const d = await api('/api/logs?offset='+logOffset+'&n=100');
    if (!d.lines || !d.lines.length) return;
    logOffset = d.total;
    const box = document.getElementById('log-box');
    d.lines.forEach(line => {
      const el = document.createElement('div');
      const low = line.toLowerCase();
      el.className = (low.includes('error')||low.includes('critical')) ? 'log-err'
                   : (low.includes('warn')) ? 'log-warn' : 'log-info';
      el.textContent = line;
      box.appendChild(el);
    });
    while (box.children.length > 500) box.removeChild(box.firstChild);
    if (document.getElementById('log-follow').checked) box.scrollTop = box.scrollHeight;
  } catch(e) {}
}

function clearLog() {
  document.getElementById('log-box').innerHTML = '';
  logOffset = 0;
}

async function loadSettings() {
  try {
    settingsData = await api('/api/rules');
    renderSettings();
  } catch(e) {}
}

function renderSettings() {
  const flat = flatten(settingsData);
  document.getElementById('settings-grid').innerHTML = Object.entries(flat)
    .filter(([,v]) => typeof v !== 'object')
    .map(([k,v]) => '<div class="field"><label>'+(LABELS[k]||k)+'</label>'
      +'<input type="number" step="any" id="cfg-'+k+'" value="'+v+'" data-key="'+k+'"></div>')
    .join('');
}

async function saveSettings() {
  const flat = flatten(settingsData);
  const updated = JSON.parse(JSON.stringify(settingsData));
  Object.keys(flat).forEach(k => {
    const el = document.getElementById('cfg-'+k);
    if (!el) return;
    const v = parseFloat(el.value);
    if (!isNaN(v)) setPath(updated, k, v);
  });
  const msgEl = document.getElementById('save-msg');
  try {
    const res = await fetch('/api/rules/save', {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(updated)
    });
    const d = await res.json();
    msgEl.style.color = d.ok ? 'var(--green)' : 'var(--red)';
    msgEl.textContent = d.msg;
    if (d.ok) settingsData = updated;
  } catch(e) {
    msgEl.style.color = 'var(--red)';
    msgEl.textContent = '저장 실패: '+e;
  }
  setTimeout(() => { msgEl.textContent = ''; }, 3000);
}

async function botAction(action) {
  try {
    const d = await fetch('/api/bot/'+action, {method:'POST'}).then(r=>r.json());
    alert(d.msg);
    fetchStatus();
  } catch(e) { alert('오류: '+e); }
}

async function api(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

function flatten(obj, prefix) {
  prefix = prefix || '';
  return Object.entries(obj).reduce((acc, [k,v]) => {
    const key = prefix ? prefix+'.'+k : k;
    if (v !== null && typeof v === 'object' && !Array.isArray(v)) Object.assign(acc, flatten(v, key));
    else acc[key] = v;
    return acc;
  }, {});
}

function setPath(obj, path, val) {
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i < parts.length-1; i++) { if (!cur[parts[i]]) cur[parts[i]] = {}; cur = cur[parts[i]]; }
  cur[parts[parts.length-1]] = val;
}

function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
